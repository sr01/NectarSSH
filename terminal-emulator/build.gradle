apply plugin: 'com.android.library'

android {
    namespace "com.termux.emulator"
    compileSdk 36

    defaultConfig {
        minSdk 24
        targetSdk 36
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation "androidx.annotation:annotation:1.9.0"
}
